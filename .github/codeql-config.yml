name: CodeQL Config

queries:
  - uses: security-and-quality
    # Disable empty catch block warnings
    disable:
      - cs/empty-catch-block

paths-ignore:
  # Exclude auto-generated code (NSwag API client)
  - '**/Generated/**'
  - 'src/Arcus.ClamAV.Api.Client/Generated/**'
  
  # Exclude test projects (not deployed to production)
  - 'src/Arcus.ClamAV.Tests/**'
  - '**/*.Tests/**'
  - '**/TestResults/**'
  
  # Exclude benchmarking projects (not deployed to production)
  - 'src/Arcus.ClamAV.Benchmarks/**'
  - '**/*.Benchmarks/**'
  
  # Exclude build artifacts
  - '**/bin/**'
  - '**/obj/**'
