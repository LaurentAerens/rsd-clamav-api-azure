name: PR Performance Check

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/pr-performance-check.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-performance:
    name: Check Performance Impact
    uses: ./.github/workflows/_measure-performance.yml

  comment-on-pr:
    name: Post Performance Metrics
    runs-on: ubuntu-latest
    needs: check-performance
    steps:
      - name: Post Performance Comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const startupTime = '${{ needs.check-performance.outputs.startup_time_ms }}';
            const imageSize = '${{ needs.check-performance.outputs.image_size_mb }}';
            const imageSizeGb = '${{ needs.check-performance.outputs.image_size_gb }}';
            
            let comment = '## ⚡ Performance Metrics\n\n';
            comment += `**Startup Time** (container launch → /healthz 200): **${startupTime}ms**\n\n`;
            comment += '| Metric | Value |\n';
            comment += '|--------|-------|\n';
            comment += `| Docker Image Size | ${imageSize}MB (${imageSizeGb}GB) |\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
