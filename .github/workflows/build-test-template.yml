name: .NET Build and Test Template

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "The name of the project"
      project_path:
        required: true
        type: string
        description: "The relative path to the project directory"
      run_tests:
        required: false
        type: boolean
        default: true
        description: "Flag to run or skip tests"
env:
  DOTNET_VERSION: '10.0.x'
  EF_VERSION: '6.0.5'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      checks: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      env:
        PROJECT_PATH: ${{ inputs.project_path }}
      run: dotnet restore "$PROJECT_PATH"

    - name: Build
      env:
        CI: true
        PROJECT_PATH: ${{ inputs.project_path }}
      run: dotnet build --no-restore --configuration Release -p:CI="$CI" "$PROJECT_PATH"

    - name: Build Docker Image
      run: docker compose build

    - name: Run Tests
      if: ${{ inputs.run_tests }}
      run: |
        dotnet test src/Arcus.ClamAV.Tests/bin/Release/net10.0/Arcus.ClamAV.Tests.dll \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory=./coverage

    - name: Generate Coverage Report
      if: ${{ inputs.run_tests }}
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.2.0
        reportgenerator \
          -reports:"./coverage/**/coverage.cobertura.xml" \
          -targetdir:"./coverage/report" \
          -reporttypes:"Badges;SummaryGithub" \
          -classfilters:"+Arcus.ClamAV*"

    - name: Extract Coverage Metrics
      if: ${{ inputs.run_tests }}
      id: coverage
      run: |
        # Extract line coverage percentage from the Cobertura report
        if [ -f "./coverage/report/SummaryGithub.md" ]; then
          COVERAGE=$(grep -oP '(?<=alt=")[^"]*line coverage[^"]*' "./coverage/report/SummaryGithub.md" | grep -oP '\d+' | head -1)
          if [ -z "$COVERAGE" ]; then
            COVERAGE="0"
          fi
          echo "COVERAGE_PERCENT=${COVERAGE}" >> $GITHUB_OUTPUT
        else
          echo "COVERAGE_PERCENT=0" >> $GITHUB_OUTPUT
        fi

    - name: Upload Coverage Reports
      if: ${{ inputs.run_tests }}
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/test-results.trx'
        check_name: Unit Test Results
        comment_mode: always

    - name: Add Coverage Comment
      if: ${{ inputs.run_tests && github.event_name == 'pull_request' }}
      uses: actions/github-script@v8
      env:
        COVERAGE_PERCENT: ${{ steps.coverage.outputs.COVERAGE_PERCENT }}
        GITHUB_REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const coverage = process.env.COVERAGE_PERCENT || '0';
          const githubRepo = process.env.GITHUB_REPO;
          const prNumber = process.env.PR_NUMBER;
          
          // Create coverage comment
          const comment = `## \ud83d\udcc8 Code Coverage Report for Arcus.ClamAV\n\n| Metric | Value |\n|--------|-------|\n| Line Coverage | ${coverage}% |\n| Report | [View on Codecov](https://codecov.io/gh/${githubRepo}/pull/${prNumber}) |\n\nFor detailed coverage information, see the [Codecov report](https://codecov.io/gh/${githubRepo}).`;
          
          // Find existing coverage comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const existingComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('\ud83d\udcc8 Code Coverage Report')
          );
          
          if (existingComment) {
            // Update existing comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: comment
            });
          } else {
            // Create new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }